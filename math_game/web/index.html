<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Math Game — fast-paced mental math.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Math Game">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Math Game</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #121214; }
    #loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: #121214;
      color: #3DF5A0; font-family: sans-serif;
    }
    #loading .title { font-size: 28px; letter-spacing: 4px; font-weight: bold; }
    #loading .sub { color: #9AA0AD; font-size: 13px; margin-top: 8px; }
    .spinner {
      margin-top: 20px; width: 36px; height: 36px; border: 3px solid #232329;
      border-top-color: #3DF5A0; border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Krovimosi ekranas (kad nematytum balto ekrano, kol kraunasi variklis) -->
  <div id="loading">
    <div class="title">MATH GAME</div>
    <div class="sub">Kraunama… / Loading…</div>
    <div class="spinner"></div>
  </div>

  <script>
    // Paslepiam krovimosi ekraną, kai Flutter app paleidžiamas.
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (el) el.remove();
    });

    // Cache-busting: kiekvienas deploy turi unikalų BUILD_STAMP, todėl
    // naršyklė PRIVALO parsisiųsti naują flutter_bootstrap.js (ne iš atminties).
    (function () {
      var s = document.createElement('script');
      s.src = 'flutter_bootstrap.js?v=BUILD_STAMP';
      s.async = true;
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
